name: AlleyFist CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: alleyfist-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  debug-test:
    name: Debug build and CTest
    runs-on: ubuntu-24.04
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-binary-cache
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            autoconf-archive \
            automake \
            bison \
            flex \
            '^libxcb.*-dev' \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libice-dev \
            libsm-dev \
            libtool \
            libx11-xcb-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxrender-dev \
            ninja-build \
            pkg-config

      - name: Bootstrap vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg/downloads
            ${{ github.workspace }}/.vcpkg-binary-cache
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Configure Debug
        run: cmake --preset vcpkg-debug

      - name: Build Debug
        run: cmake --build --preset debug --parallel

      - name: Run CTest
        run: ctest --test-dir build-debug --output-on-failure --timeout 120

  release-package:
    name: Release build and CPack
    runs-on: ubuntu-24.04
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-binary-cache

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            autoconf-archive \
            automake \
            bison \
            flex \
            '^libxcb.*-dev' \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libice-dev \
            libsm-dev \
            libtool \
            libx11-xcb-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxrender-dev \
            ninja-build \
            pkg-config

      - name: Bootstrap vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg/downloads
            ${{ github.workspace }}/.vcpkg-binary-cache
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Configure Release
        run: cmake --preset vcpkg-release

      - name: Build Release
        run: cmake --build --preset release --parallel

      - name: Create CPack archive
        run: cpack --config build-release/CPackConfig.cmake --verbose

      - name: Upload Release package
        uses: actions/upload-artifact@v4
        with:
          name: AlleyFist-Linux-Release
          path: 'build-release/*.tar.gz'
          if-no-files-found: error

  windows-debug-test:
    name: Windows Debug build and CTest
    runs-on: windows-2022
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-binary-cache
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "$env:VCPKG_ROOT"
          & "$env:VCPKG_ROOT/bootstrap-vcpkg.bat" -disableMetrics

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg/downloads
            ${{ github.workspace }}/.vcpkg-binary-cache
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Configure Debug
        shell: pwsh
        run: cmake --preset vcpkg-debug

      - name: Build Debug
        shell: pwsh
        run: cmake --build --preset debug --parallel

      - name: Run CTest
        shell: pwsh
        run: ctest --test-dir build-debug -C Debug --output-on-failure --timeout 120

  windows-release-package:
    name: Windows Release build and CPack
    runs-on: windows-2022
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-binary-cache

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "$env:VCPKG_ROOT"
          & "$env:VCPKG_ROOT/bootstrap-vcpkg.bat" -disableMetrics

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg/downloads
            ${{ github.workspace }}/.vcpkg-binary-cache
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Configure Release
        shell: pwsh
        run: cmake --preset vcpkg-release

      - name: Build Release
        shell: pwsh
        run: cmake --build --preset release --parallel

      - name: Create CPack archive
        shell: pwsh
        run: cpack --config build-release/CPackConfig.cmake --verbose

      - name: Upload Release package
        uses: actions/upload-artifact@v4
        with:
          name: AlleyFist-Windows-Release
          path: 'build-release/*.zip'
          if-no-files-found: error
